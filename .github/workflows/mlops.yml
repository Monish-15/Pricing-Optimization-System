name: MLOps Training & Deployment Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  mlops-pipeline:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r backend/requirements.txt

    - name: Run Data Pipeline & Model Training
      run: |
        # Script to test the pipeline isolated
        python -c "from backend import db, mlops_pipeline; db.init_db(); mlops_pipeline.generate_initial_data(); mlops_pipeline.train_model()"

    - name: Verify Model Artifact
      run: |
        test -f backend/pricing_model.pkl || (echo "Model failed to generate!" && exit 1)

    - name: Build Docker Image
      run: |
        echo "FROM python:3.10" > Dockerfile
        echo "WORKDIR /app" >> Dockerfile
        echo "COPY . ." >> Dockerfile
        echo "RUN pip install -r backend/requirements.txt" >> Dockerfile
        echo "EXPOSE 8000" >> Dockerfile
        echo "CMD [\"python\", \"-m\", \"uvicorn\", \"backend.main:app\", \"--host\", \"0.0.0.0\", \"--port\", \"8000\"]" >> Dockerfile
        docker build -t nexus-pricing .
        
    - name: Test API Endpoint
      run: |
        docker run -d -p 8000:8000 --name nexus-api nexus-pricing
        sleep 5
        curl -X POST http://localhost:8000/predict-price -H "Content-Type: application/json" -d '{"demand": 200, "supply": 50, "time": "evening"}'
