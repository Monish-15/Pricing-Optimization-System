name: MLOps Training & Deployment Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  mlops-pipeline:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r backend/requirements.txt

    - name: Run Data Pipeline & Model Training
      run: |
        # Script to test the pipeline isolated
        python -c "from backend import db, mlops_pipeline; db.init_db(); mlops_pipeline.generate_initial_data(); mlops_pipeline.train_model()"

    - name: Verify Model Artifact
      run: |
        test -f backend/pricing_model.pkl || (echo "Model failed to generate!" && exit 1)

    - name: Build Docker Image
      run: |
        docker build -t nexus-pricing:latest .
        
    - name: Test API Endpoint
      run: |
        docker run -d -p 8000:8000 --name nexus-api nexus-pricing:latest
        sleep 10
        # Check running container
        docker ps | grep nexus-api
        # Test model prediction endpoint
        curl -X POST http://localhost:8000/predict-price -H "Content-Type: application/json" -d '{"demand": 200, "supply": 50, "time": "evening"}'
        # Test frontend bundle static serving
        curl -s http://localhost:8000/ | grep "Nexus"

    - name: Log in to Docker Hub
      if: github.event_name == 'push' && github.ref == 'refs/heads/main'
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Tag and Push Docker Image
      if: github.event_name == 'push' && github.ref == 'refs/heads/main'
      run: |
        docker tag nexus-pricing:latest ${{ secrets.DOCKERHUB_USERNAME }}/nexus-pricing:latest
        docker push ${{ secrets.DOCKERHUB_USERNAME }}/nexus-pricing:latest

